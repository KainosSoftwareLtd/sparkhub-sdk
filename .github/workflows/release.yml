name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_REF: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install (workspaces)
        run: npm ci

      # Build sdk first — @sparkhub/react imports @sparkhub/sdk's dist/
      # types for its own tsc to resolve, and npm workspaces builds in
      # alphabetical order (react before sdk) which fails without this.
      - name: Build @sparkhub/sdk
        run: npm -w @sparkhub/sdk run build

      - name: Build @sparkhub/react
        run: npm -w @sparkhub/react run build

      - name: Build @sparkhub/kb-viewer
        run: npm -w @sparkhub/kb-viewer run build

      - name: Type check (all workspaces)
        run: npm run type-check

      - name: Test (all workspaces)
        run: npm test

      - name: Verify all package versions match tag
        run: |
          TAG_VERSION="${TAG_REF#v}"
          for pkg in packages/*/package.json; do
            PKG_NAME=$(node -p "require('./${pkg}').name")
            PKG_VERSION=$(node -p "require('./${pkg}').version")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::${PKG_NAME} version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
              exit 1
            fi
            echo "OK: ${PKG_NAME}@${PKG_VERSION}"
          done

      - name: Pack tarballs
        id: pack
        run: |
          mkdir -p .release-artifacts
          for pkg in packages/*/; do
            (cd "$pkg" && npm pack --pack-destination ../../.release-artifacts/)
          done
          ls -la .release-artifacts/
          ARTIFACTS=$(ls .release-artifacts/*.tgz | tr '\n' ' ')
          printf 'artifacts=%s\n' "$ARTIFACTS" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACTS: ${{ steps.pack.outputs.artifacts }}
        run: |
          # shellcheck disable=SC2086
          gh release create "$TAG_REF" $ARTIFACTS \
            --title "$TAG_REF" \
            --generate-notes
