name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_REF: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Pack tarball
        id: pack
        run: |
          npm pack --pack-destination .
          TARBALL=$(ls sparkhub-sdk-*.tgz | head -n1)
          printf 'tarball=%s\n' "$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${TAG_REF#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          gh release create "$TAG_REF" "$TARBALL" \
            --title "$TAG_REF" \
            --generate-notes
